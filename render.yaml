services:
  - type: web
    name: zero-trust-security
    env: python
    plan: free
    buildCommand: "npm install --prefix frontend && npm run build --prefix frontend && pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BREVO_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "libroflow8@gmail.com"
      - key: FROM_NAME
        value: "Zero Trust Security"
      - key: ADMIN_EMAIL
        value: "admin@zerotrust.com"
      - key: FRONTEND_URL
        value: "https://zero-trust-security-zqun.onrender.com"
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "18.16.0"
